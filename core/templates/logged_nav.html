<header class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-zinc-800">
  <nav class="container mx-auto px-4 lg:px-8">
    <div class="flex h-16 items-center justify-between">

      <!-- Logo -->
      <a href="{% url 'home' %}" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
          <!-- icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>
        <span class="text-xl font-bold text-white">Eventify</span>
      </a>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center gap-8">
        <a href="{% url 'events' %}" class="text-zinc-400 hover:text-white">Browse Events</a>
        <a href="{% url 'how-it-works' %}" class="text-zinc-400 hover:text-white">How It Works</a>
        <a href="{% url 'categories' %}" class="text-zinc-400 hover:text-white">Categories</a>
        <a href="{% url 'contact' %}" class="text-zinc-400 hover:text-white">Contact</a>
      </div>

      <div class="flex items-center">
            <!-- User Dropdown -->
          <div class="relative">
            <!-- Profile Button -->
            <button id="user-menu-button" class="flex items-center gap-2 focus:outline-none">
              <img
                class="h-9 w-9 rounded-full object-cover"
                src="{{ user.profile_image.url }}"
                alt="User Avatar"
              />
              <svg xmlns="http://www.w3.org/2000/svg" 
                  fill="none" viewBox="0 0 24 24" stroke-width="1.5" 
                  stroke="currentColor" class="w-5 h-5 text-white">
                <path stroke-linecap="round" stroke-linejoin="round" 
                  d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
              </svg>
            </button>

            <!-- Dropdown Menu -->
            <div
              id="user-menu"
              class="absolute right-0 mt-2 w-56 bg-zinc-700 rounded-md shadow-xl py-2 hidden 
                    transition-all duration-200 origin-top-right transform scale-95 opacity-0"
            >
              <!-- Dashboard -->
              <a
                href="{% url 'dashboard' %}"
                class="flex items-center gap-2 px-4 py-2 text-sm text-white hover:bg-cyan-600 hover:text-white"
              >
                <svg xmlns="http://www.w3.org/2000/svg" 
                    fill="none" viewBox="0 0 24 24" stroke-width="1.5" 
                    stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" 
                    d="M2.25 12l9.5-9.5 9.5 9.5M4.5 10.5V21h6v-6h3v6h6V10.5" />
                </svg>
                Dashboard
              </a>

              <!-- Profile -->
              <a
                href="{% url 'profile' %}"
                class="flex items-center gap-2 px-4 py-2 text-sm text-white hover:bg-cyan-600 hover:text-white"
              >
                <svg xmlns="http://www.w3.org/2000/svg" 
                    fill="none" viewBox="0 0 24 24" stroke-width="1.5" 
                    stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" 
                    d="M15.75 6.75a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25c0-3.728
                      3.022-6.75 6.75-6.75s6.75 3.022 6.75 6.75" />
                </svg>
                Profile
              </a>

              <!-- Logout -->
              <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button
                  class="w-full flex items-center gap-2 px-4 py-2 text-sm text-white 
                        hover:bg-cyan-600 hover:text-white text-left"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" 
                      fill="none" viewBox="0 0 24 24" stroke-width="1.5" 
                      stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" 
                      d="M6 12h12M6 12l4-4M6 12l4 4" />
                  </svg>
                  Logout
                </button>
              </form>
            </div>
          </div>
          <!-- Mobile Menu Button -->
          <button id="menu-btn" class="md:hidden text-3xl"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
          </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden py-4 border-t border-zinc-800">
      <div class="flex flex-col gap-4">
        <a href="{% url 'events' %}" class="text-zinc-400 hover:text-white">Browse Events</a>
        <a href="{% url 'how-it-works' %}" class="text-zinc-400 hover:text-white">How It Works</a>
        <a href="{% url 'categories' %}" class="text-zinc-400 hover:text-white">Categories</a>
        <a href="{% url 'contact' %}" class="text-zinc-400 hover:text-white">Contact</a>

        <div class="flex flex-col gap-2 pt-4 border-t border-zinc-800">
          <a href="{% url 'profile' %}" class="text-white">Profile</a>
          <a href="{% url 'logout' %}" class="bg-primary text-black px-4 py-2 rounded-lg text-center">
            Logout
          </a>
        </div>
      </div>
    </div>
  </nav>
</header>
