<header class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-zinc-800">
  <nav class="container mx-auto px-4 lg:px-8">
    <div class="flex h-16 items-center justify-between">

      <!-- Logo -->
      <a href="{% url 'home' %}" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
          <!-- icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>

        </div>
        <span class="text-xl font-bold text-white">Eventify</span>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center gap-8">
        <a href="{% url 'events' %}" class="text-zinc-400 hover:text-white">Browse Events</a>
        <a href="{% url 'how-it-works' %}" class="text-zinc-400 hover:text-white">How It Works</a>
        <a href="{% url 'categories' %}" class="text-zinc-400 hover:text-white">Categories</a>
        <a href="{% url 'contact' %}" class="text-zinc-400 hover:text-white">Contact</a>
      </div>

      <!-- Auth -->
      <div class="hidden md:flex items-center gap-4">
        <a href="{% url 'sign-in' %}" class="text-white hover:text-primary">
          Log in
        </a>
        <a href="{% url 'sign-up' %}" class="bg-primary text-black px-4 py-2 rounded-lg hover:bg-primary/90">
          Sign up
        </a>
      </div>

      <!-- Mobile Button -->
      <button id="menu-btn" class="md:hidden text-white text-2xl">
        ☰
      </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden py-4 border-t border-zinc-800">
      <div class="flex flex-col gap-4">
          <a href="{% url 'home' %}" class="text-zinc-400 hover:text-white">Browse Events</a>
          <a href="{% url 'how-it-works' %}" class="text-zinc-400 hover:text-white">How It Works</a>
          <a href="{% url 'categories' %}" class="text-zinc-400 hover:text-white">Categories</a>
          <a href="{% url 'contact' %}" class="text-zinc-400 hover:text-white">Contact</a>

        <div class="flex flex-col gap-2 pt-4 border-t border-zinc-800">
          <a href="{% url 'sign-in' %}" class="text-white">Log in</a>
          <a href="{% url 'sign-up' %}" class="bg-primary text-black px-4 py-2 rounded-lg text-center">
            Sign up
          </a>
        </div>
      </div>
    </div>
