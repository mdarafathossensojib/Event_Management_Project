<section class="py-20 bg-zinc-900 border-y border-zinc-800">
  <div class="container mx-auto px-4 lg:px-8">

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-8 lg:gap-12">

      <!-- Stat 1 -->
      <div class="text-center">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/10 mb-4">
          <!-- Calendar Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>

        <div class="text-3xl md:text-4xl font-bold text-white mb-1">
          <span class="count" data-target="50000">0</span>+
        </div>
        <div class="text-lg font-medium text-white mb-1">
          Events Hosted
        </div>
        <div class="text-sm text-zinc-400">
          Successful events organized
        </div>
      </div>

      <!-- Stat 2 -->
      <div class="text-center">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/10 mb-4">
          <!-- Users Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 20h5V9H2v11h5m10 0a5 5 0 00-10 0"/>
          </svg>
        </div>

        <div class="text-3xl md:text-4xl font-bold text-white mb-1">
          <span class="count" data-target="100">0</span>M+
        </div>
        <div class="text-lg font-medium text-white mb-1">
          Active Users
        </div>
        <div class="text-sm text-zinc-400">
          Growing community members
        </div>
      </div>

      <!-- Stat 3 -->
      <div class="text-center">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/10 mb-4">
          <!-- MapPin Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 11c1.656 0 3-1.567 3-3.5S13.656 4 12 4s-3 1.567-3 3.5S10.344 11 12 11z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 22s8-4.5 8-11a8 8 0 10-16 0c0 6.5 8 11 8 11z"/>
          </svg>
        </div>

        <div class="text-3xl md:text-4xl font-bold text-white mb-1">
          <span class="count" data-target="150">0</span>+
        </div>
        <div class="text-lg font-medium text-white mb-1">
          Cities Worldwide
        </div>
        <div class="text-sm text-zinc-400">
          Global event coverage
        </div>
      </div>

      <!-- Stat 4 -->
      <div class="text-center">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/10 mb-4">
          <!-- Award Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8c-3.866 0-7 1.79-7 4v4h14v-4c0-2.21-3.134-4-7-4z"/>
          </svg>
        </div>

        <div class="text-3xl md:text-4xl font-bold text-white mb-1">
          <span class="count" data-target="98">0</span>%
        </div>
        <div class="text-lg font-medium text-white mb-1">
          Satisfaction Rate
        </div>
        <div class="text-sm text-zinc-400">
          Happy attendees
        </div>
      </div>

    </div>
  </div>
</section>

<script>
  const counters = document.querySelectorAll(".count");

  const animateCount = (el) => {
    const target = +el.getAttribute("data-target");
    let count = 0;

    const update = () => {
      const increment = target / 100;

      if (count < target) {
        count += increment;
        el.innerText = Math.floor(count).toLocaleString();
        requestAnimationFrame(update);
      } else {
        el.innerText = target.toLocaleString();
      }
    };

    update();
  };

  // Intersection Observer (scroll trigger)
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        animateCount(entry.target);
      }
    });
  }, { threshold: 0.5 });

  counters.forEach((counter) => {
    observer.observe(counter);
  });
</script>
