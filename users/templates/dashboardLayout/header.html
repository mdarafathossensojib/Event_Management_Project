{% load static %}
<header class="sticky top-0 z-40 bg-black/80 backdrop-blur-md border-b border-zinc-800">
    <div class="flex items-center justify-between h-16 px-4 lg:px-6">
        

        <!-- Mobile Logo (only visible on mobile) -->
        <div class="md:hidden flex items-center gap-2">
            <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
            </div>
            <span class="text-xl font-bold text-white">Eventify</span>
        </div>

        <!-- Desktop Logo (only visible on desktop) -->
        <div class="hidden lg:flex items-center gap-2">
            <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
            </div>
            <span class="text-xl font-bold text-white">Eventify</span>
        </div>

        

        <!-- Actions -->
        <div class="flex items-center gap-3">
            <!-- Mobile search button -->
            <button 
                class="lg:hidden text-gray-400 hover:text-white"
                onclick="toggleSearch()"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </button>
            
            <!-- Notification bell -->
            <button class="relative text-gray-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                </svg>
                <span class="absolute top-0 right-0 w-2 h-2 bg-cyan-500 rounded-full"></span>
            </button>

            <!-- User avatar (desktop) -->
            <div class="hidden lg:flex items-center gap-3 pl-3 border-l border-zinc-800">
                <div class="w-9 h-9 rounded-full bg-cyan-500/10 flex items-center justify-center">
                    <svg class="w-5 h-5 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Search (hidden by default) -->
    <div id="mobileSearch" class="hidden p-4 border-t border-zinc-800 lg:hidden">
        <div class="relative">
            <input
                type="text"
                placeholder="Search events..."
                class="w-full  h-10 pl-5 pr-4 bg-zinc-900 border border-zinc-800 rounded-lg text-white placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                autofocus
            />
        </div>
    </div>

    <!-- Mobile Menu (hidden by default) -->
    <div id="mobileMenu" class="hidden lg:hidden fixed inset-0 z-50 bg-black">
        <div class="flex items-center justify-between h-16 px-6 border-b border-zinc-800">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <span class="text-xl font-bold text-white">Eventify</span>
            </div>
            <button onclick="toggleMobileMenu()">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <nav class="p-6 space-y-2 overflow-y-auto">
            <a href="{% url 'dashboard' %}" class="block px-4 py-3 rounded-lg bg-zinc-900 text-white">
                Dashboard
            </a>
            <a href="{% url 'dashboard_rsvps' %}" class="block px-4 py-3 rounded-lg text-gray-400 hover:bg-zinc-900 hover:text-white transition-colors">
                My RSVPs
            </a>
            <a href="{% url 'dashboard_saved' %}" class="block px-4 py-3 rounded-lg text-gray-400 hover:bg-zinc-900 hover:text-white transition-colors">
                Saved Events
            </a>
            <a href="{% url 'dashboard' %}" class="block px-4 py-3 rounded-lg text-gray-400 hover:bg-zinc-900 hover:text-white transition-colors">
                Profile
            </a>
            <a href="{% url 'dashboard_settings' %}" class="block px-4 py-3 rounded-lg text-gray-400 hover:bg-zinc-900 hover:text-white transition-colors">
                Settings
            </a>
            <hr class="border-zinc-800 my-4" />
            <a href="{% url 'logout' %}" class="block px-4 py-3 rounded-lg text-gray-400 hover:bg-zinc-900 hover:text-white transition-colors">
                Sign Out
            </a>
        </nav>
    </div>
</header>

<script>
    function toggleMobileMenu() {
        const menu = document.getElementById('mobileMenu');
        if (menu) {
            menu.classList.toggle('hidden');
        }
    }

    function toggleSearch() {
        const search = document.getElementById('mobileSearch');

        if (search.classList.contains('hidden')) {
            search.classList.remove('hidden');
        } else {
            search.classList.add('hidden');
        }
    }
</script>
