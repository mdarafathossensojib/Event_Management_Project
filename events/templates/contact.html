{% extends 'base.html' %}
{% block content %}
<section class="py-32 mt-20 bg-black">
    <div class="container mx-auto px-4 max-w-4xl">
        <div class="grid md:grid-cols-2 gap-12 bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden p-8">
            <div>
                <h2 class="text-3xl font-bold text-white mb-6">Get in <span class="text-cyan-400">Touch</span></h2>
                <p class="text-gray-400 mb-8">Have questions about an event or need help with your account? Our team is here for you.</p>
                
                <div class="space-y-4">
                    <div class="flex items-center gap-4 text-gray-300">
                        <div class="w-10 h-10 bg-cyan-500/10 rounded-lg flex items-center justify-center text-cyan-400">
                            <i class="fas fa-envelope"></i>
                        </div>
                        support@eventify.com
                    </div>
                </div>
            </div>

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Your Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white outline-none focus:border-cyan-500">
                <input type="email" name="email" placeholder="Email Address" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white outline-none focus:border-cyan-500">
                <textarea name="message" rows="4" placeholder="Your Message" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white outline-none focus:border-cyan-500"></textarea>
                <button class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 rounded-xl transition-all">
                    Send Message
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
